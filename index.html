<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be My Valentine? 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #ffeef8 0%, #ffe0f0 50%, #ffd4ea 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(255, 105, 180, 0.3);
            max-width: 500px;
            position: relative;
        }

        h1 {
            color: #ff1493;
            font-size: 2.5em;
            margin-bottom: 20px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .question {
            font-size: 1.5em;
            color: #ff69b4;
            margin: 30px 0;
        }

        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 40px;
            position: relative;
            min-height: 80px;
        }

        button {
            padding: 15px 40px;
            font-size: 1.2em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        #yesBtn {
            background: linear-gradient(135deg, #ff1493, #ff69b4);
            color: white;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        #yesBtn:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 30px rgba(255, 20, 147, 0.4);
        }

        #noBtn {
            background: #e0e0e0;
            color: #666;
        }

        .celebration {
            display: none;
        }

        .celebration.active {
            display: block;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .photo-container {
            margin: 30px 0;
            position: relative;
        }

        .photo-container img {
            max-width: 100%;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.3);
        }

        .hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            font-size: 30px;
            animation: float 4s ease-in infinite;
            opacity: 0;
        }

        @keyframes float {
            0% {
                opacity: 0;
                transform: translateY(100vh) rotate(0deg);
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) rotate(360deg);
            }
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #ff1493;
            position: absolute;
            animation: confetti-fall 3s linear infinite;
        }

        @keyframes confetti-fall {
            to {
                transform: translateY(100vh) rotate(360deg);
            }
        }

        .celebration-text {
            font-size: 2em;
            color: #ff1493;
            margin: 20px 0;
            animation: rainbow 3s ease-in-out infinite;
        }

        @keyframes rainbow {
            0% { color: #ff1493; }
            25% { color: #ff69b4; }
            50% { color: #ff1493; }
            75% { color: #ff69b4; }
            100% { color: #ff1493; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="question-screen">
            <h1>💕 Valentine's Day 2026 💕</h1>
            <p class="question">Will you be my Valentine?</p>
            
            <div class="buttons">
                <button id="yesBtn">Yes! 💖</button>
                <button id="noBtn">No</button>
            </div>
        </div>

        <div id="celebration-screen" class="celebration">
            <h1>🎉 YES! 🎉</h1>
            <p class="celebration-text">You made me the happiest person! 💕</p>
            
            <div class="photo-container">
                <img id="couplePhoto" src="" alt="Our Photo Together 💕">
                <!-- Replace the src above with your actual photo URL or upload a photo -->
                <!-- For now, I'll add a placeholder that you can replace -->
            </div>
            
            <p style="font-size: 1.3em; color: #ff69b4; margin-top: 20px;">
                I love you so much! Happy Valentine's Day! 🌹❤️
            </p>
        </div>
    </div>

    <div class="hearts" id="heartsContainer"></div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const questionScreen = document.getElementById('question-screen');
        const celebrationScreen = document.getElementById('celebration-screen');
        const heartsContainer = document.getElementById('heartsContainer');
        const couplePhoto = document.getElementById('couplePhoto');

        // Make the No button run away from the cursor
        noBtn.addEventListener('mouseover', () => {
            moveNoButton();
        });

        // Prevent clicking the No button on mobile
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveNoButton();
        });

        function moveNoButton() {
            const x = Math.random() * (window.innerWidth - 200);
            const y = Math.random() * (window.innerHeight - 200);
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        // Yes button action
        yesBtn.addEventListener('click', () => {
            questionScreen.style.display = 'none';
            celebrationScreen.classList.add('active');
            
            // Create floating hearts
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    createHeart();
                }, i * 100);
            }
            
            // Create confetti
            createConfetti();
        });

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '💖';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDelay = Math.random() * 2 + 's';
            heart.style.fontSize = (Math.random() * 20 + 20) + 'px';
            heartsContainer.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 4000);
        }

        function createConfetti() {
            const colors = ['#ff1493', '#ff69b4', '#ffc0cb', '#ff6b9d', '#c71585'];
            
            for (let i = 0; i < 100; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.classList.add('confetti');
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDelay = Math.random() * 3 + 's';
                    confetti.style.top = '-10px';
                    document.body.appendChild(confetti);

                    setTimeout(() => {
                        confetti.remove();
                    }, 3000);
                }, i * 30);
            }
        }

        // IMPORTANT: Replace this placeholder with your actual photo
        // Option 1: Use a direct image URL
        couplePhoto.src = 'IMG_0321.jpeg';
        
        // Option 2: Or if you want to use a local file, you can convert it to base64
        // and paste it directly in the src attribute above
        
        // If no photo is provided, show a cute placeholder
        couplePhoto.onerror = function() {
            this.src = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300"><rect fill="%23ffe0f0" width="400" height="300"/><text x="50%" y="50%" font-size="24" fill="%23ff1493" text-anchor="middle" dominant-baseline="middle">Add your photo here! 💕</text></svg>';
        };
    </script>
</body>
</html>
