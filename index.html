<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Be My Valentine 💕</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background: linear-gradient(135deg, #ffeef8, #ffd4ea);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      overflow-x: hidden;
    }

    .container {
      background: white;
      width: min(92vw, 520px);
      padding: 36px 28px;
      border-radius: 32px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(255,105,180,0.35);
    }

    /* ====== 标题（已彻底防溢出） ====== */
    h1.title {
      position: relative;
      color: #ff1493;
      font-size: clamp(1.6em, 5vw, 2.3em);
      line-height: 1.15;
      margin-bottom: 16px;
      padding: 0 2.6em;
      text-align: center;
      overflow: hidden;
      animation: pulse 1.5s ease-in-out infinite;
    }

    h1.title::before,
    h1.title::after {
      content: "💕";
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.95em;
      opacity: 0.95;
      pointer-events: none;
    }

    h1.title::before { left: 0.6em; }
    h1.title::after  { right: 0.6em; }

    @media (max-width: 420px) {
      h1.title {
        padding: 0 2.1em;
      }
      h1.title::before { left: 0.35em; }
      h1.title::after  { right: 0.35em; }
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .question {
      color: #ff69b4;
      font-size: clamp(1.2em, 4vw, 1.45em);
      margin-bottom: 24px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 18px;
      position: relative;
      min-height: 70px;
    }

    button {
      padding: 14px 36px;
      font-size: 1.1em;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: 0.25s ease;
    }

    #yesBtn {
      background: linear-gradient(135deg, #ff1493, #ff69b4);
      color: white;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    #yesBtn:hover {
      transform: scale(1.08);
      box-shadow: 0 10px 30px rgba(255,20,147,0.35);
    }

    #noBtn {
      background: #e0e0e0;
      color: #666;
    }

    /* ====== YES 页面 ====== */
    .celebration { display: none; }
    .celebration.active {
      display: block;
      animation: fadeIn 0.8s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .celebration h2 {
      color: #ff1493;
      font-size: clamp(1.7em, 5vw, 2em);
      margin-bottom: 10px;
    }

    .celebration-text {
      color: #ff1493;
      font-size: clamp(1.2em, 4.5vw, 1.6em);
      margin-bottom: 14px;
    }

    .photo-container img {
      width: 100%;
      max-height: 55vh;
      object-fit: cover;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(255,105,180,0.3);
    }

    .footer-text {
      margin-top: 12px;
      color: #ff69b4;
      font-size: clamp(1.05em, 4vw, 1.25em);
    }

    /* ====== 爱心动画 ====== */
    .hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .heart {
      position: absolute;
      font-size: 26px;
      animation: float 4s ease-in infinite;
      opacity: 0;
    }

    @keyframes float {
      0% { opacity: 0; transform: translateY(100vh); }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { opacity: 0; transform: translateY(-100px); }
    }
  </style>
</head>

<body>
  <div class="container">
    <div id="question-screen">
      <h1 class="title">Valentine's Day 2026</h1>
      <p class="question">Will you be my Valentine?</p>

      <div class="buttons">
        <button id="yesBtn">Yes! 💖</button>
        <button id="noBtn">No</button>
      </div>
    </div>

    <div id="celebration-screen" class="celebration">
      <h2>🎉 YES! 🎉</h2>
      <p class="celebration-text">You made me the happiest person! 💕</p>

      <div class="photo-container">
        <img src="IMG_0321.jpeg" alt="Our Photo 💕">
      </div>

      <p class="footer-text">I love you so much! Happy Valentine's Day! 🌹❤️</p>
    </div>
  </div>

  <div class="hearts" id="hearts"></div>

  <script>
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const q = document.getElementById('question-screen');
    const c = document.getElementById('celebration-screen');
    const hearts = document.getElementById('hearts');

    noBtn.addEventListener('mouseover', moveNo);
    noBtn.addEventListener('touchstart', e => {
      e.preventDefault();
      moveNo();
    }, { passive:false });

    function moveNo() {
      const r = noBtn.getBoundingClientRect();
      const x = Math.random() * (window.innerWidth - r.width - 20);
      const y = Math.random() * (window.innerHeight - r.height - 20);
      noBtn.style.position = 'fixed';
      noBtn.style.left = x + 'px';
      noBtn.style.top = y + 'px';
    }

    yesBtn.addEventListener('click', () => {
      q.style.display = 'none';
      c.classList.add('active');
      for(let i=0;i<40;i++) setTimeout(makeHeart, i*120);
    });

    function makeHeart() {
      const h = document.createElement('div');
      h.className = 'heart';
      h.textContent = '💖';
      h.style.left = Math.random()*100+'vw';
      h.style.fontSize = 20 + Math.random()*20 + 'px';
      hearts.appendChild(h);
      setTimeout(()=>h.remove(),4000);
    }
  </script>
</body>
</html>
