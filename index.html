<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Be My Valentine? 💕</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background: linear-gradient(135deg, #ffeef8 0%, #ffe0f0 50%, #ffd4ea 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      overflow-x: hidden;
      overflow-y: auto;

      padding: 16px;
      padding-top: max(16px, env(safe-area-inset-top));
      padding-bottom: max(16px, env(safe-area-inset-bottom));
    }

    .container {
      background: white;
      text-align: center;
      padding: 40px;
      border-radius: 30px;
      box-shadow: 0 20px 60px rgba(255, 105, 180, 0.3);
      width: min(92vw, 520px);
      position: relative;
    }

    /* ✅ 标题：强制一行 + 响应式字号 + 更紧凑 */
    h1 {
  color: #ff1493;
  font-size: clamp(1.6em, 5vw, 2.3em);
  margin-bottom: 14px;
  line-height: 1.15;
  animation: pulse 1.5s ease-in-out infinite;

  /* ✅ 关键：允许换行 + 防溢出 */
  white-space: normal;
  overflow-wrap: anywhere;
  word-break: keep-all;
}
    @media (min-width: 520px) {
  h1 {
    white-space: nowrap; /* 大屏再强制一行 */
  }
}


    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .question {
      font-size: clamp(1.2em, 4vw, 1.45em);
      color: #ff69b4;
      margin: 18px 0 6px;
      line-height: 1.25;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin-top: 26px;
      min-height: 70px;
      position: relative;
    }

    button {
      padding: 14px 34px;
      font-size: 1.1em;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.25s ease;
      -webkit-tap-highlight-color: transparent;
    }

    #yesBtn {
      background: linear-gradient(135deg, #ff1493, #ff69b4);
      color: white;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    #yesBtn:hover {
      transform: scale(1.08);
      box-shadow: 0 10px 30px rgba(255, 20, 147, 0.35);
    }

    #noBtn {
      background: #e0e0e0;
      color: #666;
    }

    .celebration { display: none; }
    .celebration.active {
      display: block;
      animation: fadeIn 0.8s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.92); }
      to { opacity: 1; transform: scale(1); }
    }

    /* ✅ YES页标题更紧凑，减少占屏高度 */
    #celebration-screen h1 {
      font-size: clamp(1.7em, 5vw, 2.0em);
      margin-bottom: 10px;
      animation: none; /* YES页面不脉冲，观感更稳 */
      white-space: normal; /* 允许 YES 这行自适应，不强制一行 */
    }

    .celebration-text {
      font-size: clamp(1.2em, 4.5vw, 1.6em);
      color: #ff1493;
      max-width: 92%;
      margin: 0 auto 14px;
      line-height: 1.25;
    }

    .photo-container { margin: 18px 0 14px; }

    /* ✅ 限制照片高度，避免“一屏看不到下面内容” */
    .photo-container img {
      width: 100%;
      height: auto;
      max-height: 55vh;
      object-fit: cover;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(255, 105, 180, 0.3);
    }

    .footer-text {
      font-size: clamp(1.05em, 3.8vw, 1.25em);
      color: #ff69b4;
      margin-top: 10px;
      line-height: 1.25;
    }

    .hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .heart {
      position: absolute;
      font-size: 26px;
      animation: float 4s ease-in infinite;
      opacity: 0;
    }

    @keyframes float {
      0%   { opacity: 0; transform: translateY(100vh); }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { opacity: 0; transform: translateY(-100px); }
    }

    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      animation: confetti-fall 3s linear infinite;
    }

    @keyframes confetti-fall {
      to { transform: translateY(100vh) rotate(360deg); }
    }

    @media (max-width: 480px) {
      .container {
        padding: 22px;
        border-radius: 22px;
      }

      button {
        padding: 14px 26px;
        font-size: 1.05em;
      }

      .buttons {
        gap: 14px;
        margin-top: 22px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div id="question-screen">
      <!-- ✅ 标题一行 -->
      <h1>💕 Valentine's Day 2026 💕</h1>
      <p class="question">Will you be my Valentine?</p>

      <div class="buttons">
        <button id="yesBtn">Yes! 💖</button>
        <button id="noBtn">No</button>
      </div>
    </div>

    <div id="celebration-screen" class="celebration">
      <h1>🎉 YES! 🎉</h1>
      <p class="celebration-text">You made me the happiest person! 💕</p>

      <div class="photo-container">
        <img id="couplePhoto" src="IMG_0321.jpeg" alt="Our Photo 💕" />
      </div>

      <p class="footer-text">I love you so much! Happy Valentine's Day! 🌹❤️</p>
    </div>
  </div>

  <div class="hearts" id="heartsContainer"></div>

  <script>
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const questionScreen = document.getElementById('question-screen');
    const celebrationScreen = document.getElementById('celebration-screen');
    const heartsContainer = document.getElementById('heartsContainer');
    const couplePhoto = document.getElementById('couplePhoto');

    // ✅ No按钮：跑，但不会跑出屏幕
    noBtn.addEventListener('mouseover', moveNoButton);
    noBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      moveNoButton();
    }, { passive: false });

    function moveNoButton() {
      const rect = noBtn.getBoundingClientRect();
      const padding = 12;

      const maxX = window.innerWidth - rect.width - padding;
      const maxY = window.innerHeight - rect.height - padding;

      const x = Math.random() * Math.max(maxX, padding);
      const y = Math.random() * Math.max(maxY, padding);

      noBtn.style.position = 'fixed';
      noBtn.style.left = x + 'px';
      noBtn.style.top = y + 'px';
    }

    // ✅ Yes按钮：切屏 + 爱心 + 彩带
    yesBtn.addEventListener('click', () => {
      questionScreen.style.display = 'none';
      celebrationScreen.classList.add('active');

      for (let i = 0; i < 40; i++) {
        setTimeout(createHeart, i * 120);
      }
      createConfetti();
    });

    function createHeart() {
      const heart = document.createElement('div');
      heart.className = 'heart';
      heart.innerHTML = '💖';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.fontSize = (20 + Math.random() * 20) + 'px';
      heartsContainer.appendChild(heart);

      setTimeout(() => heart.remove(), 4000);
    }

    function createConfetti() {
      const colors = ['#ff1493', '#ff69b4', '#ffc0cb'];
      for (let i = 0; i < 80; i++) {
        setTimeout(() => {
          const c = document.createElement('div');
          c.className = 'confetti';
          c.style.left = Math.random() * 100 + 'vw';
          c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
          c.style.top = '-10px';
          document.body.appendChild(c);

          setTimeout(() => c.remove(), 3000);
        }, i * 30);
      }
    }

    // ✅ 图片加载失败：给一个可爱的占位
    couplePhoto.onerror = function() {
      this.src =
        'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300"><rect fill="%23ffe0f0" width="400" height="300"/><text x="50%" y="50%" font-size="24" fill="%23ff1493" text-anchor="middle" dominant-baseline="middle">Add your photo here! 💕</text></svg>';
    };
  </script>
</body>
</html>
